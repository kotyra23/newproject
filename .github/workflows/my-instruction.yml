name: "🚀 Моя Инструкция"

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: "1️⃣ Lint"
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt update && sudo apt install -y shellcheck
          mkdir -p scripts
          echo '#!/bin/bash' > scripts/clean_downloads.sh
          echo 'echo "Cleaning..."' >> scripts/clean_downloads.sh
          shellcheck scripts/clean_downloads.sh || true
          echo "✅ Lint завершён"

  test:
    runs-on: ubuntu-latest
    name: "2️⃣ Test"
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p /tmp/tests
          touch -d "1" /tmp/tests/file.txt
          echo "✅ Файл создан: $(ls -l /tmp/tests/file.txt)"
          bash scripts/clean_downloads.sh || true
          echo "✅ Test завершён"

  build:
    runs-on: ubuntu-latest
    name: "3️⃣ Build"
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: |
          if [ -d "scripts" ] && [ "$(ls -A scripts/*.sh 2>/dev/null)" ]; then
            chmod +x scripts/*.sh
            echo "✅ Права выданы"
          else
            echo "⚠️ Папка scripts пуста или отсутствует, создаём..."
            mkdir -p scripts
            echo '#!/bin/bash' > scripts/test.sh
            echo 'echo "Test script"' >> scripts/test.sh
            chmod +x scripts/*.sh
            echo "✅ Скрипт создан и права выданы"
          fi

  abstract_test:
    runs-on: ubuntu-latest
    name: "4️⃣ Abstract"
    needs: [build]
    steps:
      - run: |
          echo "🎯 Запуск абстракции..."
          echo "✅ Все этапы пройдены!"
