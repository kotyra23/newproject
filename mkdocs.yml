site_name: DevOps Справочник
docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  features:
    - navigation.instant      # Мгновенная загрузка страниц
    - navigation.sections     # Секции в боковой панели
    - navigation.expand       # Раскрытие всех разделов по умолчанию
    - content.code.copy       # Кнопка копирования кода
    - content.tabs.link       # Синхронизация вкладо

extra_css:
 - css/custom.css 

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - admonition                # Блоки заметок (Note, Warning и т.д.)
  - pymdownx.details          # Раскрывающиеся блоки
  - toc:
      permalink: true         # Ссылки на заголовки

nav:
  - Главная: index.md
  # 🐙 GIT
  - Git:
    - Основы: git/основы.md
    - Ветвление: git/ветвление.md
    - Продвинутый: git/продвинутый.md
  # ==========================================
  # 🐧 1. LINUX (Основы, Bash, Сети)
  # ==========================================
  - Linux:
    - Основы системы: линукс/основы.md
    - Сети Linux: линукс/сети.md
    - Редакторы и права: линукс/редакторы_и_права.md
    - Файловые системы: линукс/файловые_системы.md
    
    - Bash Скриптинг:
      - Основы: линукс/bash_скриптинг_основы.md
      - Продвинутый: линукс/bash_скриптинг_продвинутый.md
    
    - Устранение неисправностей:
      - Высокая нагрузка: линукс/устранение_неисправностей/высокая_нагрузка.md
      - Сетевые задержки: линукс/устранение_неисправностей/сетевые_задержки.md
      - Ошибки дисков: линукс/устранение_неисправностей/ошибки_дисков.md

  # ==========================================
  # 🐳 2. DOCKER & CONTAINERS
  # ==========================================
  - Контейнеры:
    - Docker:
      - Основы: контейнеры/докер/основы.md
    - Docker Compose:
      - Основы: контейнеры/docker_compose/основы.md
    - Podman:
      - Основы: контейнеры/подман/основы.md

  # ==========================================
  # ☸️ 3. KUBERNETES
  # ==========================================
  - Kubernetes:
    - Основы:
      - Базы: кубернетес/основы/базы.md
    - Сети:
      - Конфигурация: кубернетес/сети/конфигурация.md
    - Хранение данных:
      - Конфигурация: кубернетес/хранение_данных/конфигурация.md
    - Безопасность:
      - Конфигурация: кубернетес/безопасность/конфигурация.md
    - Операторы:
      - Основы: кубернетес/операторы/основы.md

  # ==========================================
  # 🔄 4. CI/CD
  # ==========================================
  - Сборка и доставка:
    - GitLab CI/CD: сборка_и_доставка/gitlab_ci/пайплайны.md
    - GitHub Actions: сборка_и_доставка/github_actions/пайплайны.md
    - Jenkins: сборка_и_доставка/jenkins/пайплайны.md

  # ==========================================
  # 🏗️ 5. INFRASTRUCTURE AS CODE
  # ==========================================
  - Инфраструктура как код:
    - Terraform: инфраструктура_как_код/terraform/основы.md
    - Ansible: инфраструктура_как_код/ansible/основы.md
    - Pulumi: инфраструктура_как_код/pulumi/основы.md

  # ==========================================
  # 📊 6. MONITORING
  # ==========================================
  - Мониторинг:
    - Prometheus: мониторинг/prometheus/конфигурация.md
    - Grafana: мониторинг/grafana/конфигурация.md
    - Loki: мониторинг/loki/конфигурация.md
    - Оповещения: мониторинг/оповещения/конфигурация.md

  # ==========================================
  # ☁️ 7. CLOUD & OTHER
  # ==========================================
  - Облачные платформы:
    - AWS: облачные_платформы/aws/основы.md
    - Yandex Cloud: облачные_платформы/yandex_cloud/основы.md
    - DigitalOcean: облачные_платформы/digitalocean/основы.md

  - Инструкции по восстановлению: инструкции_по_восстановлению/обзор.md
  - Шпаргалки и команды: шпаргалки_и_команды/обзор.md
  - Разборы инцидентов: разборы_инцидентов/обзор.md










